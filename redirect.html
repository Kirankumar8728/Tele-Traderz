<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating - Tele Trader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #0b0e14;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #ef4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Finalizing authentication...</p>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token1 = params.get('token1');
        
        if (token1) {
            console.log('[DEBUG] Token1 found, processing accounts...');
            // Extract all available accounts
            const accounts = [];
            let bestToken = token1;
            let bestPriority = 0; // 0: default, 1: virtual, 2: real, 3: real USD
            console.log('[DEBUG] URL Params:', window.location.search);

            for (let i = 1; i <= 10; i++) {
                const t = params.get(`token${i}`);
                const a = params.get(`acct${i}`);
                const c = params.get(`cur${i}`);
                
                if (t && a) {
                    console.log(`[DEBUG] Found account ${i}:`, a);
                    const resolvedCurrency = c || 'USD';
                    accounts.push({ id: a, token: t, currency: resolvedCurrency });
                    
                    // Priority logic
                    let priority = 1; // Virtual
                    if (!a.startsWith('VRT')) {
                        priority = 2; // Real
                        if (resolvedCurrency.toUpperCase() === 'USD') {
                            priority = 3; // Real USD
                        }
                    }
                    
                    if (priority > bestPriority) {
                        bestPriority = priority;
                        bestToken = t;
                    }
                }
            }
            
            localStorage.setItem('deriv_token', bestToken);
            localStorage.setItem('deriv_accounts', JSON.stringify(accounts));
            localStorage.setItem('deriv_active_account', accounts[0].id);
            console.log('[DEBUG] Stored accounts:', accounts);
            console.log('[DEBUG] Stored token:', localStorage.getItem('deriv_token'));
        } else {
            console.log('[DEBUG] No token1 found in URL params');
        }
        
        // Redirect back to main app
        window.location.href = '/';
    </script>
</body>
</html>
